version: v1
deps:
  - buf.build/bufbuild/protovalidate
  - buf.build/googleapis/googleapis
  - buf.build/gnostic/gnostic
breaking:
  use:
    - FILE
  except:
    - FIELD_SAME_CARDINALITY
    - FIELD_SAME_JSON_NAME
    - FIELD_SAME_ONEOF
    - FIELD_SAME_TYPE
    - FIELD_SAME_NAME
lint:
  use:
    - STANDARD
    - ENUM_FIRST_VALUE_ZERO
    - COMMENT_MESSAGE
    - COMMENT_RPC
    - COMMENT_SERVICE
  rpc_allow_google_protobuf_empty_responses: true
